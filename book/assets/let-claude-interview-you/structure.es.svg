<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 370" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#4a6fa5"/>
    </marker>
    <marker id="arrow-tan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#a5764a"/>
    </marker>
  </defs>

  <!-- minimal prompt -->
  <rect x="40" y="90" width="180" height="80" rx="10" fill="#f6f1e7" stroke="#a5764a" stroke-width="1.5"/>
  <text x="130" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c">Prompt mínimo</text>
  <text x="130" y="146" text-anchor="middle" font-size="11" fill="#5b6b7c">la idea en dos frases</text>

  <line x1="222" y1="130" x2="268" y2="130" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- interview loop -->
  <rect x="270" y="70" width="250" height="120" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="395" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">La entrevista</text>
  <text x="395" y="122" text-anchor="middle" font-size="11" fill="#5b6b7c">el agente pregunta lo difícil,</text>
  <text x="395" y="138" text-anchor="middle" font-size="11" fill="#5b6b7c">el desarrollador decide —</text>
  <text x="395" y="154" text-anchor="middle" font-size="11" fill="#5b6b7c">pregunta a pregunta, hasta cubrir todo</text>

  <line x1="522" y1="130" x2="578" y2="130" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SPEC.md -->
  <rect x="580" y="70" width="260" height="120" rx="10" fill="#f6f1e7" stroke="#a5764a" stroke-width="2"/>
  <text x="710" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c" font-family="ui-monospace, 'SF Mono', Menlo, monospace">SPEC.md</text>
  <text x="710" y="122" text-anchor="middle" font-size="11" fill="#5b6b7c">autosuficiente: archivos e interfaces,</text>
  <text x="710" y="138" text-anchor="middle" font-size="11" fill="#5b6b7c">el «fuera de alcance» listado,</text>
  <text x="710" y="154" text-anchor="middle" font-size="11" fill="#5b6b7c">comprobación de extremo a extremo</text>

  <!-- session boundary -->
  <line x1="560" y1="225" x2="850" y2="225" stroke="#a54a4a" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="440" y="230" text-anchor="middle" font-size="11" fill="#a54a4a">la frontera de sesiones: la entrevista queda atrás, la spec cruza</text>

  <!-- fresh session -->
  <line x1="710" y1="192" x2="710" y2="248" stroke="#a5764a" stroke-width="1.5" marker-end="url(#arrow-tan)"/>
  <rect x="580" y="250" width="260" height="64" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="710" y="276" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c">Sesión fresca</text>
  <text x="710" y="298" text-anchor="middle" font-size="11" fill="#5b6b7c">ventana limpia + la especificación</text>

  <!-- principle -->
  <text x="440" y="352" text-anchor="middle" font-size="13" font-style="italic" fill="#5b6b7c">el tiempo en precisar la spec rinde más que el tiempo vigilando la implementación</text>
</svg>
