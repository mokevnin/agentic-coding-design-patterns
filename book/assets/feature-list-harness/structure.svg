<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 350" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#4a6fa5"/>
    </marker>
    <marker id="arrow-tan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#a5764a"/>
    </marker>
  </defs>

  <!-- requirements -->
  <rect x="40" y="110" width="190" height="80" rx="10" fill="#f6f1e7" stroke="#a5764a" stroke-width="1.5"/>
  <text x="135" y="142" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">Требования</text>
  <text x="135" y="166" text-anchor="middle" font-size="11" fill="#5b6b7c">спецификация</text>
  <text x="135" y="215" text-anchor="middle" font-size="11" fill="#a5764a">разворачивается в реестр</text>
  <text x="135" y="230" text-anchor="middle" font-size="11" fill="#a5764a">один раз, целиком</text>
  <line x1="232" y1="150" x2="288" y2="150" stroke="#a5764a" stroke-width="1.5" marker-end="url(#arrow-tan)"/>

  <!-- the ledger -->
  <rect x="290" y="60" width="250" height="220" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="2"/>
  <text x="415" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c" font-family="ui-monospace, 'SF Mono', Menlo, monospace">feature-list.json</text>
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" text-anchor="start">
    <text x="315" y="118" fill="#4a6fa5">✓ создание заметки — passes</text>
    <text x="315" y="140" fill="#a54a4a">✗ поиск по тегу — failing</text>
    <text x="315" y="162" fill="#a54a4a">✗ архивация — failing</text>
    <text x="315" y="184" fill="#5b6b7c">… ещё 84 пункта</text>
  </g>
  <text x="415" y="226" text-anchor="middle" font-size="11" fill="#a54a4a">агент меняет только поле статуса;</text>
  <text x="415" y="242" text-anchor="middle" font-size="11" fill="#a54a4a">удалять и править пункты нельзя</text>

  <!-- session cycle -->
  <rect x="600" y="60" width="240" height="220" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="720" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">Цикл сессии</text>
  <g font-size="11" fill="#5b6b7c" text-anchor="start">
    <text x="622" y="116">1. смок-тест</text>
    <text x="622" y="138">2. взять следующую failing</text>
    <text x="622" y="160">3. реализовать</text>
    <text x="622" y="182">4. проверить как пользователь</text>
    <text x="622" y="204">5. переключить статус</text>
  </g>
  <text x="720" y="240" text-anchor="middle" font-size="11" fill="#a54a4a">регрессия? passing → failing</text>

  <!-- ledger <-> session -->
  <line x1="542" y1="120" x2="598" y2="120" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="570" y="110" text-anchor="middle" font-size="10" fill="#5b6b7c">фича</text>
  <line x1="598" y1="250" x2="542" y2="250" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="570" y="268" text-anchor="middle" font-size="10" fill="#5b6b7c">статус</text>

  <!-- principle -->
  <text x="440" y="330" text-anchor="middle" font-size="13" font-style="italic" fill="#5b6b7c">статус переключает проверка, а не ощущение «готово»</text>
</svg>
