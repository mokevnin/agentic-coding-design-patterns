<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 350" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#4a6fa5"/>
    </marker>
    <marker id="arrow-tan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#a5764a"/>
    </marker>
  </defs>

  <!-- requirements -->
  <rect x="40" y="110" width="190" height="80" rx="10" fill="#f6f1e7" stroke="#a5764a" stroke-width="1.5"/>
  <text x="135" y="142" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">Requirements</text>
  <text x="135" y="166" text-anchor="middle" font-size="11" fill="#5b6b7c">the specification</text>
  <text x="135" y="215" text-anchor="middle" font-size="11" fill="#a5764a">expanded into the ledger</text>
  <text x="135" y="230" text-anchor="middle" font-size="11" fill="#a5764a">once, in full</text>
  <line x1="232" y1="150" x2="288" y2="150" stroke="#a5764a" stroke-width="1.5" marker-end="url(#arrow-tan)"/>

  <!-- the ledger -->
  <rect x="290" y="60" width="250" height="220" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="2"/>
  <text x="415" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c" font-family="ui-monospace, 'SF Mono', Menlo, monospace">feature-list.json</text>
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" text-anchor="start">
    <text x="315" y="118" fill="#4a6fa5">✓ create a note — passes</text>
    <text x="315" y="140" fill="#a54a4a">✗ search by tag — failing</text>
    <text x="315" y="162" fill="#a54a4a">✗ archiving — failing</text>
    <text x="315" y="184" fill="#5b6b7c">… 84 more items</text>
  </g>
  <text x="415" y="226" text-anchor="middle" font-size="11" fill="#a54a4a">the agent flips only the status field;</text>
  <text x="415" y="242" text-anchor="middle" font-size="11" fill="#a54a4a">removing or editing items is forbidden</text>

  <!-- session cycle -->
  <rect x="600" y="60" width="240" height="220" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="720" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">Session cycle</text>
  <g font-size="11" fill="#5b6b7c" text-anchor="start">
    <text x="622" y="116">1. smoke test</text>
    <text x="622" y="138">2. pick the next failing one</text>
    <text x="622" y="160">3. implement</text>
    <text x="622" y="182">4. verify as a user</text>
    <text x="622" y="204">5. flip the status</text>
  </g>
  <text x="720" y="240" text-anchor="middle" font-size="11" fill="#a54a4a">regression? passing → failing</text>

  <!-- ledger <-> session -->
  <line x1="542" y1="120" x2="598" y2="120" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="570" y="110" text-anchor="middle" font-size="10" fill="#5b6b7c">feature</text>
  <line x1="598" y1="250" x2="542" y2="250" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="570" y="268" text-anchor="middle" font-size="10" fill="#5b6b7c">status</text>

  <!-- principle -->
  <text x="440" y="330" text-anchor="middle" font-size="13" font-style="italic" fill="#5b6b7c">the status is flipped by a check, not by a feeling of "done"</text>
</svg>
