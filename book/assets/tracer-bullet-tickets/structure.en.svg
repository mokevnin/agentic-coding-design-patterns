<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 415" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#4a6fa5"/>
    </marker>
    <marker id="arrow-tan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#a5764a"/>
    </marker>
  </defs>

  <text x="440" y="26" text-anchor="middle" font-size="12" fill="#a5764a">blocking edges set the order; tickets with no blockers form the frontier</text>

  <!-- the spec -->
  <rect x="40" y="130" width="150" height="90" rx="10" fill="#f6f1e7" stroke="#a5764a" stroke-width="1.5"/>
  <text x="115" y="164" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c">The spec</text>
  <text x="115" y="186" text-anchor="middle" font-size="11" fill="#5b6b7c">an approved epic</text>
  <line x1="192" y1="175" x2="228" y2="175" stroke="#a5764a" stroke-width="1.5" marker-end="url(#arrow-tan)"/>

  <!-- layers -->
  <g stroke="#5b6b7c" stroke-width="0.8" fill="#fff">
    <rect x="230" y="90" width="380" height="45"/>
    <rect x="230" y="135" width="380" height="45"/>
    <rect x="230" y="180" width="380" height="45"/>
    <rect x="230" y="225" width="380" height="45"/>
  </g>
  <g font-size="11" fill="#5b6b7c" text-anchor="start">
    <text x="240" y="117">schema</text>
    <text x="240" y="162">API</text>
    <text x="240" y="207">UI</text>
    <text x="240" y="252">tests</text>
  </g>

  <!-- tracer strips -->
  <g fill="#f6f1e7" fill-opacity="0.85" stroke="#a5764a" stroke-width="2">
    <rect x="305" y="72" width="70" height="226" rx="8"/>
    <rect x="405" y="72" width="70" height="226" rx="8"/>
    <rect x="505" y="72" width="70" height="226" rx="8"/>
  </g>
  <g font-size="11" font-weight="600" fill="#1a2b3c" text-anchor="middle">
    <text x="340" y="62">ticket 1</text>
    <text x="440" y="62">ticket 2</text>
    <text x="540" y="62">ticket 3</text>
  </g>
  <g stroke="#4a6fa5" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <line x1="377" y1="86" x2="403" y2="86"/>
    <line x1="477" y1="86" x2="503" y2="86"/>
  </g>

  <!-- execution -->
  <line x1="612" y1="175" x2="648" y2="175" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="650" y="120" width="190" height="110" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="745" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c">The frontier</text>
  <text x="745" y="174" text-anchor="middle" font-size="11" fill="#5b6b7c">tickets with no blockers;</text>
  <text x="745" y="190" text-anchor="middle" font-size="11" fill="#5b6b7c">one per session,</text>
  <text x="745" y="206" text-anchor="middle" font-size="11" fill="#5b6b7c">each one lands green</text>

  <!-- horizontal-slicing contrast -->
  <text x="440" y="340" text-anchor="middle" font-size="12" fill="#a54a4a">for contrast: a horizontal slice — a wide piece of one layer —</text>
  <text x="440" y="356" text-anchor="middle" font-size="12" fill="#a54a4a">is demoable only at the integration at the very end</text>

  <!-- principle -->
  <text x="440" y="398" text-anchor="middle" font-size="13" font-style="italic" fill="#5b6b7c">a narrow slice through every layer — demoable on its own</text>
</svg>
