<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#4a6fa5"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#a54a4a"/>
    </marker>
  </defs>

  <!-- writer -->
  <rect x="40" y="80" width="240" height="120" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="160" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">Writer — session A</text>
  <text x="160" y="138" text-anchor="middle" font-size="11" fill="#5b6b7c">the full history: the task,</text>
  <text x="160" y="154" text-anchor="middle" font-size="11" fill="#5b6b7c">the reasoning, the edits</text>
  <text x="160" y="178" text-anchor="middle" font-size="11" fill="#4a6fa5">fixes what was found</text>

  <!-- reviewer -->
  <rect x="600" y="80" width="240" height="120" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="720" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">Reviewer — fresh context</text>
  <text x="720" y="138" text-anchor="middle" font-size="11" fill="#5b6b7c">a separate session or subagent;</text>
  <text x="720" y="154" text-anchor="middle" font-size="11" fill="#5b6b7c">sees only the diff and criteria</text>
  <text x="720" y="178" text-anchor="middle" font-size="11" fill="#4a6fa5">finds — doesn't fix</text>

  <!-- diff + criteria across the boundary -->
  <rect x="345" y="88" width="190" height="44" rx="8" fill="#f6f1e7" stroke="#a5764a" stroke-width="1.5"/>
  <text x="440" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#1a2b3c">diff + criteria</text>
  <text x="440" y="122" text-anchor="middle" font-size="10" fill="#5b6b7c">plan · specification · axes</text>
  <line x1="282" y1="110" x2="343" y2="110" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="537" y1="110" x2="598" y2="110" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- findings back -->
  <rect x="345" y="158" width="190" height="44" rx="8" fill="#f9eded" stroke="#a54a4a" stroke-width="1.5"/>
  <text x="440" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#1a2b3c">findings</text>
  <text x="440" y="192" text-anchor="middle" font-size="10" fill="#5b6b7c">gaps, not taste</text>
  <line x1="598" y1="180" x2="537" y2="180" stroke="#a54a4a" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="343" y1="180" x2="282" y2="180" stroke="#a54a4a" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- boundary note -->
  <text x="440" y="242" text-anchor="middle" font-size="12" fill="#a54a4a">the author's reasoning never crosses the boundary —</text>
  <text x="440" y="258" text-anchor="middle" font-size="12" fill="#a54a4a">that is the whole mechanism</text>

  <!-- adversarial variant -->
  <rect x="250" y="284" width="380" height="56" rx="10" fill="#fff" stroke="#a54a4a" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="440" y="306" text-anchor="middle" font-size="12" font-weight="600" fill="#1a2b3c">the hardened variant — refutation:</text>
  <text x="440" y="326" text-anchor="middle" font-size="11" fill="#5b6b7c">"prove that this doesn't work"</text>

  <!-- principle -->
  <text x="440" y="370" text-anchor="middle" font-size="13" font-style="italic" fill="#5b6b7c">the work is judged by someone other than whoever did it</text>
</svg>
