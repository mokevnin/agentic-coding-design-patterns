<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 355" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#4a6fa5"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#a54a4a"/>
    </marker>
  </defs>

  <!-- lane 1: one-shot attempt -->
  <text x="60" y="62" text-anchor="start" font-size="12" font-weight="600" fill="#a54a4a">without the constraint — a one-shot attempt</text>
  <rect x="60" y="76" width="160" height="56" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="140" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c">Pass 1</text>
  <text x="140" y="120" text-anchor="middle" font-size="11" fill="#5b6b7c">the whole front at once</text>
  <line x1="222" y1="104" x2="288" y2="104" stroke="#a54a4a" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="290" y="76" width="550" height="56" rx="10" fill="#f9eded" stroke="#a54a4a" stroke-width="1.5"/>
  <text x="565" y="100" text-anchor="middle" font-size="12" fill="#1a2b3c">feature A ~ · feature B ~ · feature C ~ · feature D ~ · …</text>
  <text x="565" y="120" text-anchor="middle" font-size="11" fill="#a54a4a">the window ran out — none finished, none verified</text>

  <!-- lane 2: one at a time -->
  <text x="60" y="212" text-anchor="start" font-size="12" font-weight="600" fill="#4a6fa5">one feature at a time</text>
  <rect x="60" y="226" width="200" height="64" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="160" y="252" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c">Pass 1</text>
  <text x="160" y="274" text-anchor="middle" font-size="11" fill="#4a6fa5">feature A — verified ✓</text>

  <line x1="262" y1="258" x2="298" y2="258" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="300" y="226" width="200" height="64" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="400" y="252" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c">Pass 2</text>
  <text x="400" y="274" text-anchor="middle" font-size="11" fill="#4a6fa5">feature B — verified ✓</text>

  <line x1="502" y1="258" x2="538" y2="258" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="540" y="226" width="200" height="64" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="640" y="252" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c">Pass 3</text>
  <text x="640" y="274" text-anchor="middle" font-size="11" fill="#4a6fa5">feature C — verified ✓</text>

  <line x1="742" y1="258" x2="778" y2="258" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="800" y="263" text-anchor="start" font-size="14" fill="#5b6b7c">…</text>

  <!-- mid note -->
  <text x="440" y="172" text-anchor="middle" font-size="12" fill="#5b6b7c">whatever is noticed along the way goes to the feature list and the journal, not into the current diff</text>

  <!-- principle -->
  <text x="440" y="338" text-anchor="middle" font-size="13" font-style="italic" fill="#5b6b7c">the window is spent on depth, not breadth; only finished features count</text>
</svg>
