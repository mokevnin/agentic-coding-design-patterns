<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 410" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#4a6fa5"/>
    </marker>
    <marker id="arrow-tan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#a5764a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#a54a4a"/>
    </marker>
  </defs>

  <text x="450" y="26" text-anchor="middle" font-size="12" fill="#a5764a">собирается в конце сессии — под цель следующей</text>

  <!-- handoff document -->
  <rect x="330" y="40" width="240" height="166" rx="10" fill="#f6f1e7" stroke="#a5764a" stroke-width="2"/>
  <text x="450" y="66" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c" font-family="ui-monospace, 'SF Mono', Menlo, monospace">handoff.md</text>
  <g fill="#5b6b7c" text-anchor="middle" font-size="11">
    <text x="450" y="92">состояние и цель</text>
    <text x="450" y="112">решения и их «почему»</text>
    <text x="450" y="132">отброшенные тупики</text>
    <text x="450" y="152">следующий шаг</text>
    <text x="450" y="172">ссылки на артефакты</text>
  </g>

  <!-- sessions -->
  <rect x="40" y="70" width="230" height="90" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="155" y="102" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">Сессия A — окно на исходе</text>
  <text x="155" y="126" text-anchor="middle" font-size="11" fill="#5b6b7c">контекст ещё цел</text>

  <rect x="630" y="70" width="210" height="90" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="735" y="102" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">Сессия B — свежее окно</text>
  <text x="735" y="126" text-anchor="middle" font-size="11" fill="#5b6b7c">начинает с документа</text>

  <line x1="272" y1="115" x2="328" y2="115" stroke="#a5764a" stroke-width="1.5" marker-end="url(#arrow-tan)"/>
  <line x1="572" y1="115" x2="628" y2="115" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- permanent artifacts, referenced not retold -->
  <rect x="355" y="246" width="190" height="52" rx="8" fill="#fff" stroke="#4a6fa5" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="450" y="268" text-anchor="middle" font-size="12" fill="#1a2b3c">спеки · ADR · коммиты</text>
  <text x="450" y="286" text-anchor="middle" font-size="11" fill="#5b6b7c">ссылками, не дублями</text>
  <line x1="450" y1="208" x2="450" y2="244" stroke="#4a6fa5" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow)"/>

  <!-- autocompact alternative -->
  <path d="M155 162 L155 330 L735 330 L735 164" fill="none" stroke="#a54a4a" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-red)"/>
  <text x="445" y="352" text-anchor="middle" font-size="12" fill="#a54a4a">автокомпакт: что уцелеет из контекста — не выбираешь,</text>
  <text x="445" y="368" text-anchor="middle" font-size="12" fill="#a54a4a">и тред продолжается вместо чистого старта</text>

  <!-- principle -->
  <text x="440" y="398" text-anchor="middle" font-size="13" font-style="italic" fill="#5b6b7c">что переживёт границу сессии, решает разработчик</text>
</svg>
