<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#4a6fa5"/>
    </marker>
    <marker id="arrow-tan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#a5764a"/>
    </marker>
  </defs>

  <text x="440" y="26" text-anchor="middle" font-size="12" fill="#a5764a">categoría: bug o enhancement — exactamente una; estado — exactamente uno</text>

  <!-- incoming -->
  <rect x="40" y="70" width="170" height="56" rx="10" fill="#fff" stroke="#5b6b7c" stroke-width="1.5"/>
  <text x="125" y="94" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c">Entrante</text>
  <text x="125" y="114" text-anchor="middle" font-size="11" fill="#5b6b7c">un issue o un PR externo</text>
  <line x1="212" y1="98" x2="268" y2="98" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- needs-triage -->
  <rect x="270" y="70" width="190" height="56" rx="10" fill="#f6f1e7" stroke="#a5764a" stroke-width="2"/>
  <text x="365" y="94" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c" font-family="ui-monospace, 'SF Mono', Menlo, monospace">needs-triage</text>
  <text x="365" y="114" text-anchor="middle" font-size="11" fill="#5b6b7c">el agente clasifica, el humano decide</text>

  <!-- outcomes -->
  <g stroke="#4a6fa5" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <line x1="462" y1="82" x2="618" y2="62"/>
    <line x1="462" y1="98" x2="618" y2="132"/>
    <line x1="462" y1="114" x2="618" y2="202"/>
  </g>

  <rect x="620" y="40" width="220" height="52" rx="10" fill="#f6f1e7" stroke="#a5764a" stroke-width="1.5"/>
  <text x="730" y="62" text-anchor="middle" font-size="12" font-weight="600" fill="#1a2b3c" font-family="ui-monospace, 'SF Mono', Menlo, monospace">ready-for-agent</text>
  <text x="730" y="80" text-anchor="middle" font-size="10" fill="#5b6b7c">brief autosuficiente adjunto</text>

  <rect x="620" y="110" width="220" height="52" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="730" y="132" text-anchor="middle" font-size="12" font-weight="600" fill="#1a2b3c" font-family="ui-monospace, 'SF Mono', Menlo, monospace">ready-for-human</text>
  <text x="730" y="150" text-anchor="middle" font-size="10" fill="#5b6b7c">brief + por qué no se delega</text>

  <rect x="620" y="180" width="220" height="52" rx="10" fill="#f9eded" stroke="#a54a4a" stroke-width="1.5"/>
  <text x="730" y="202" text-anchor="middle" font-size="12" font-weight="600" fill="#1a2b3c" font-family="ui-monospace, 'SF Mono', Menlo, monospace">wontfix</text>
  <text x="730" y="220" text-anchor="middle" font-size="10" fill="#5b6b7c">el rechazo, anotado en la base</text>

  <!-- needs-info loop -->
  <rect x="270" y="190" width="190" height="56" rx="10" fill="#fff" stroke="#4a6fa5" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="365" y="214" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c" font-family="ui-monospace, 'SF Mono', Menlo, monospace">needs-info</text>
  <text x="365" y="234" text-anchor="middle" font-size="11" fill="#5b6b7c">preguntas concretas al reportero</text>
  <line x1="330" y1="128" x2="330" y2="188" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="188" x2="400" y2="130" stroke="#a5764a" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-tan)"/>
  <text x="475" y="162" text-anchor="start" font-size="10" fill="#a5764a">el reportero respondió</text>

  <!-- ritual -->
  <rect x="40" y="290" width="800" height="70" rx="10" fill="#fff" stroke="#a5764a" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="440" y="316" text-anchor="middle" font-size="12" font-weight="600" fill="#1a2b3c">el ritual de clasificación de cada ticket</text>
  <text x="440" y="340" text-anchor="middle" font-size="11" fill="#5b6b7c">contexto → ¿ya implementado? → ¿ya rechazado? → verificar la afirmación → entrevista si hace falta → desenlace</text>

  <!-- principle -->
  <text x="440" y="400" text-anchor="middle" font-size="13" font-style="italic" fill="#5b6b7c">al ejecutor solo llega lo verificado y lo especificado</text>
</svg>
