<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#4a6fa5"/>
    </marker>
    <marker id="arrow-tan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#a5764a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#a54a4a"/>
    </marker>
  </defs>

  <!-- evidence back to developer -->
  <path d="M730 68 L730 28 L140 28 L140 68" fill="none" stroke="#a5764a" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-tan)"/>
  <text x="435" y="20" text-anchor="middle" font-size="12" fill="#a5764a">evidencia en vez de un «listo» afirmado</text>

  <!-- developer -->
  <rect x="40" y="70" width="200" height="70" rx="10" fill="#f6f1e7" stroke="#a5764a" stroke-width="1.5"/>
  <text x="140" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">Desarrollador</text>
  <text x="140" y="122" text-anchor="middle" font-size="11" fill="#5b6b7c">define la comprobación, acepta el trabajo</text>

  <!-- agent -->
  <rect x="310" y="70" width="200" height="70" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="410" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">Agente</text>
  <text x="410" y="122" text-anchor="middle" font-size="11" fill="#5b6b7c">trabaja e itera</text>

  <!-- evidence -->
  <rect x="620" y="70" width="220" height="70" rx="10" fill="#f6f1e7" stroke="#a5764a" stroke-width="1.5"/>
  <text x="730" y="94" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">Evidencia</text>
  <text x="730" y="114" text-anchor="middle" font-size="11" fill="#5b6b7c">salida de tests, una captura,</text>
  <text x="730" y="130" text-anchor="middle" font-size="11" fill="#5b6b7c">el comando y su resultado</text>

  <!-- task handoff -->
  <line x1="242" y1="105" x2="308" y2="105" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="275" y="160" text-anchor="middle" font-size="11" fill="#5b6b7c">tarea + forma de verificar</text>

  <!-- check -->
  <rect x="310" y="240" width="200" height="100" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="410" y="266" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">Comprobación</text>
  <text x="410" y="288" text-anchor="middle" font-size="11" fill="#4a6fa5" font-family="ui-monospace, 'SF Mono', Menlo, monospace">tests · build · linter</text>
  <text x="410" y="304" text-anchor="middle" font-size="11" fill="#4a6fa5" font-family="ui-monospace, 'SF Mono', Menlo, monospace">diff contra patrón · captura</text>
  <text x="410" y="326" text-anchor="middle" font-size="11" fill="#a54a4a">señal: pasa / no pasa</text>

  <!-- loop arrows -->
  <line x1="460" y1="142" x2="460" y2="238" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="472" y="192" text-anchor="start" font-size="11" fill="#4a6fa5">ejecuta y lee</text>
  <line x1="360" y1="238" x2="360" y2="142" stroke="#a54a4a" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="348" y="192" text-anchor="end" font-size="11" fill="#a54a4a">no pasa — itera</text>

  <!-- pass -->
  <line x1="512" y1="290" x2="695" y2="144" stroke="#a5764a" stroke-width="1.5" marker-end="url(#arrow-tan)"/>
  <text x="635" y="232" text-anchor="middle" font-size="11" fill="#a5764a">pasa</text>

  <!-- principle -->
  <text x="440" y="384" text-anchor="middle" font-size="13" font-style="italic" fill="#5b6b7c">el bucle cerrado distingue la sesión que vigilas de aquella de la que te alejas</text>
</svg>
