<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#4a6fa5"/>
    </marker>
    <marker id="arrow-tan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#a5764a"/>
    </marker>
  </defs>

  <!-- before -->
  <rect x="40" y="60" width="210" height="120" rx="10" fill="#f9eded" stroke="#a54a4a" stroke-width="1.5"/>
  <text x="145" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c">Процедура в промптах</text>
  <text x="145" y="112" text-anchor="middle" font-size="11" fill="#5b6b7c">переобъясняется каждую сессию</text>
  <text x="145" y="130" text-anchor="middle" font-size="11" fill="#5b6b7c">формулировки дрейфуют</text>
  <text x="145" y="148" text-anchor="middle" font-size="11" fill="#a54a4a">выполняется по-разному</text>

  <line x1="252" y1="120" x2="328" y2="130" stroke="#a5764a" stroke-width="1.5" marker-end="url(#arrow-tan)"/>
  <text x="290" y="102" text-anchor="middle" font-size="10" fill="#a5764a">упаковывается</text>
  <text x="290" y="115" text-anchor="middle" font-size="10" fill="#a5764a">один раз</text>

  <!-- the skill -->
  <rect x="330" y="50" width="240" height="190" rx="10" fill="#f6f1e7" stroke="#a5764a" stroke-width="2"/>
  <text x="450" y="78" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c" font-family="ui-monospace, 'SF Mono', Menlo, monospace">SKILL.md</text>
  <g font-size="11" fill="#5b6b7c" text-anchor="middle">
    <text x="450" y="104">имя + описание-триггер</text>
    <text x="450" y="122">шаги с критериями завершения</text>
    <text x="450" y="140">справка — в соседних файлах,</text>
    <text x="450" y="156">подгружается по требованию</text>
    <text x="450" y="174">ведущие слова</text>
  </g>
  <text x="450" y="216" text-anchor="middle" font-size="11" fill="#4a6fa5">в git: ревью, версии, шаринг</text>

  <!-- invocation -->
  <rect x="650" y="50" width="190" height="76" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="745" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c" font-family="ui-monospace, 'SF Mono', Menlo, monospace">/имя</text>
  <text x="745" y="98" text-anchor="middle" font-size="11" fill="#5b6b7c">разработчик — командой;</text>
  <text x="745" y="114" text-anchor="middle" font-size="11" fill="#5b6b7c">ноль цены для контекста</text>

  <rect x="650" y="160" width="190" height="76" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="745" y="188" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c">авто-вызов</text>
  <text x="745" y="208" text-anchor="middle" font-size="11" fill="#5b6b7c">агент — по триггерам;</text>
  <text x="745" y="224" text-anchor="middle" font-size="11" fill="#5b6b7c">описание всегда в окне</text>

  <g stroke="#4a6fa5" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <line x1="572" y1="100" x2="648" y2="88"/>
    <line x1="572" y1="180" x2="648" y2="198"/>
  </g>

  <!-- packs -->
  <rect x="250" y="290" width="400" height="52" rx="10" fill="#fff" stroke="#a5764a" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="450" y="312" text-anchor="middle" font-size="12" font-weight="600" fill="#1a2b3c">паки скилов</text>
  <text x="450" y="330" text-anchor="middle" font-size="11" fill="#5b6b7c">готовые методологии вендорятся в проект набором</text>
  <line x1="450" y1="288" x2="450" y2="244" stroke="#a5764a" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- principle -->
  <text x="440" y="382" text-anchor="middle" font-size="13" font-style="italic" fill="#5b6b7c">правило — в память проекта, процедура — в скил</text>
</svg>
