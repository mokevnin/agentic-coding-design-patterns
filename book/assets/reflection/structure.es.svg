<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 370" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#4a6fa5"/>
    </marker>
    <marker id="arrow-tan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#a5764a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#a54a4a"/>
    </marker>
  </defs>

  <text x="440" y="26" text-anchor="middle" font-size="12" fill="#a5764a">crítica antes de corregir; lista de puntos débiles en vez de veredicto</text>

  <!-- session container -->
  <rect x="40" y="50" width="560" height="210" rx="12" fill="none" stroke="#5b6b7c" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="60" y="76" text-anchor="start" font-size="11" fill="#5b6b7c">una sesión — una ventana</text>

  <!-- draft -->
  <rect x="70" y="100" width="140" height="70" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="140" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">Borrador</text>
  <text x="140" y="152" text-anchor="middle" font-size="11" fill="#5b6b7c">el primer resultado</text>

  <line x1="212" y1="135" x2="248" y2="135" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- critique -->
  <rect x="250" y="100" width="170" height="70" rx="10" fill="#f9eded" stroke="#a54a4a" stroke-width="1.5"/>
  <text x="335" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">Crítica</text>
  <text x="335" y="144" text-anchor="middle" font-size="11" fill="#5b6b7c">según los ejes dados</text>
  <text x="335" y="160" text-anchor="middle" font-size="11" fill="#5b6b7c">lista de puntos débiles</text>

  <line x1="422" y1="135" x2="458" y2="135" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- revision -->
  <rect x="460" y="100" width="120" height="70" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="520" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">Corrección</text>
  <text x="520" y="152" text-anchor="middle" font-size="11" fill="#5b6b7c">según la lista</text>

  <!-- another round -->
  <path d="M520 172 L520 225 L335 225 L335 172" fill="none" stroke="#a54a4a" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-red)"/>
  <text x="430" y="243" text-anchor="middle" font-size="11" fill="#a54a4a">otra ronda — no más de una o dos</text>

  <!-- developer -->
  <rect x="150" y="300" width="340" height="52" rx="10" fill="#f6f1e7" stroke="#a5764a" stroke-width="1.5"/>
  <text x="320" y="321" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c">Desarrollador</text>
  <text x="320" y="340" text-anchor="middle" font-size="11" fill="#5b6b7c">fija los ejes · lee la lista · decide qué arreglar</text>
  <line x1="320" y1="298" x2="320" y2="172" stroke="#a5764a" stroke-width="1.5" marker-end="url(#arrow-tan)"/>

  <!-- result -->
  <line x1="582" y1="135" x2="658" y2="135" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="660" y="100" width="180" height="70" rx="10" fill="#f6f1e7" stroke="#a5764a" stroke-width="1.5"/>
  <text x="750" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">Resultado</text>
  <text x="750" y="152" text-anchor="middle" font-size="11" fill="#5b6b7c">tras el filtro</text>

  <text x="750" y="202" text-anchor="middle" font-size="11" fill="#a54a4a">el sesgo del autor permanece —</text>
  <text x="750" y="218" text-anchor="middle" font-size="11" fill="#a54a4a">un diff serio pasa por</text>
  <text x="750" y="234" text-anchor="middle" font-size="11" fill="#a54a4a">un contexto fresco</text>
</svg>
