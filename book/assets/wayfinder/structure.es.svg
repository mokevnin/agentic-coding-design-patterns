<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 425" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#4a6fa5"/>
    </marker>
    <marker id="arrow-tan" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#a5764a"/>
    </marker>
  </defs>

  <!-- the map -->
  <rect x="250" y="36" width="340" height="140" rx="10" fill="#f6f1e7" stroke="#a5764a" stroke-width="2"/>
  <text x="420" y="62" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2b3c">El mapa — un issue del tracker</text>
  <g font-size="11" fill="#5b6b7c" text-anchor="middle">
    <text x="420" y="88">el destino — qué cuenta como final</text>
    <text x="420" y="106">decisiones: un índice con enlaces a tickets</text>
    <text x="420" y="124">«aún sin formular» — la niebla de guerra</text>
    <text x="420" y="142">«fuera de alcance» — más allá del destino</text>
  </g>

  <!-- fog -->
  <rect x="650" y="50" width="200" height="90" rx="18" fill="#fff" stroke="#5b6b7c" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="750" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c">La niebla</text>
  <text x="750" y="100" text-anchor="middle" font-size="11" fill="#5b6b7c">preguntas que aún no</text>
  <text x="750" y="116" text-anchor="middle" font-size="11" fill="#5b6b7c">se pueden formular con precisión</text>

  <!-- tickets -->
  <g stroke-width="1" stroke="#5b6b7c" fill="none">
    <line x1="350" y1="178" x2="130" y2="228"/>
    <line x1="420" y1="178" x2="350" y2="228"/>
    <line x1="490" y1="178" x2="580" y2="228"/>
  </g>

  <rect x="40" y="230" width="170" height="60" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1"/>
  <text x="125" y="254" text-anchor="middle" font-size="12" font-weight="600" fill="#1a2b3c">✓ cerrados</text>
  <text x="125" y="274" text-anchor="middle" font-size="11" fill="#5b6b7c">la respuesta en un comentario</text>

  <rect x="250" y="230" width="200" height="60" rx="10" fill="#f6f1e7" stroke="#a5764a" stroke-width="2"/>
  <text x="350" y="254" text-anchor="middle" font-size="12" font-weight="600" fill="#1a2b3c">La frontera</text>
  <text x="350" y="274" text-anchor="middle" font-size="11" fill="#5b6b7c">abierto · sin bloquear</text>

  <rect x="490" y="230" width="180" height="60" rx="10" fill="#fff" stroke="#4a6fa5" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="580" y="254" text-anchor="middle" font-size="12" font-weight="600" fill="#1a2b3c">bloqueados</text>
  <text x="580" y="274" text-anchor="middle" font-size="11" fill="#5b6b7c">esperan decisiones</text>

  <!-- fog graduates into frontier -->
  <line x1="700" y1="142" x2="455" y2="245" stroke="#a5764a" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-tan)"/>
  <text x="640" y="205" text-anchor="middle" font-size="11" fill="#a5764a">se aclaró — ya es un ticket</text>

  <!-- session -->
  <rect x="250" y="330" width="340" height="60" rx="10" fill="#eef3f9" stroke="#4a6fa5" stroke-width="1.5"/>
  <text x="420" y="354" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2b3c">Una sesión — un ticket a la vez</text>
  <text x="420" y="374" text-anchor="middle" font-size="11" fill="#5b6b7c">reclamar → resolver → cerrar → anotar</text>
  <line x1="350" y1="292" x2="390" y2="328" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- resolution back to the map -->
  <path d="M248 360 L140 360 L140 110 L248 110" fill="none" stroke="#a5764a" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-tan)"/>
  <text x="150" y="330" text-anchor="start" font-size="11" fill="#a5764a">la decisión —</text>
  <text x="150" y="345" text-anchor="start" font-size="11" fill="#a5764a">una línea en el índice</text>

  <!-- principle -->
  <text x="440" y="416" text-anchor="middle" font-size="13" font-style="italic" fill="#5b6b7c">el mapa está listo cuando no queda nada por decidir — después viene la ejecución</text>
</svg>
